version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmaci_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pharmaci
      POSTGRES_PASSWORD: pharmaci_secret
      POSTGRES_DB: pharmaci_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pharmaci']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pharmaci_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: pharmaci_api
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://pharmaci:pharmaci_secret@postgres:5432/pharmaci_db
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: super_secret_access_jwt_key_change_in_prod
      JWT_REFRESH_SECRET: super_secret_refresh_jwt_key_change_in_prod
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      OTP_EXPIRY_MINUTES: 5
      CLOUDINARY_CLOUD_NAME: your_cloud_name
      CLOUDINARY_API_KEY: your_api_key
      CLOUDINARY_API_SECRET: your_api_secret
      RESEND_API_KEY: your_resend_api_key
      GREEN_WEB_BD_API_KEY: your_green_web_bd_key
      GREEN_WEB_BD_SENDER_ID: your_sender_id
      FROM_EMAIL: Pharmaci <no-reply@pharmaci.com.bd>
      ADMIN_EMAIL: admin@pharmaci.com.bd
      NODE_ENV: development
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      SSLCOMMERZ_STORE_ID: wakuw696fc5eeea7a0
      SSLCOMMERZ_STORE_PASS: wakuw696fc5eeea7a0@ssl
      SSLCOMMERZ_IS_LIVE: 'false'
    volumes:
      - ./apps/api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: pharmaci_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_APP_NAME: Pharmaci
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: your_cloud_name
      NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: pharmaci_products
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    depends_on:
      - api
    command: npm run dev

  prisma-studio:
    image: node:20-alpine
    container_name: pharmaci_prisma_studio
    working_dir: /app
    ports:
      - '5555:5555'
    environment:
      DATABASE_URL: postgresql://pharmaci:pharmaci_secret@postgres:5432/pharmaci_db
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma studio --port 5555 --hostname 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  web_node_modules:
  web_next:
